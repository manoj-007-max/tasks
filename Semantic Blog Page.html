<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Blog Page</title>
</head>
<body style="font-family:sans-serif; display:grid; grid-template-columns:3fr 1fr">
  <header style="grid-column:1/3; border-bottom:1px solid #ccc">
    <h1>My Blog</h1>
    <nav><a href="#">Home</a></nav>
  </header>

  <main>
    <article>
      <h2>First Post</h2>
      <section>A clean blog built using only semantic HTML tags.</section>
    </article>
  </main>

  <aside>
    <h3>Categories</h3>
    <section>Technology</section>
  </aside>

  <footer style="grid-column:1/3; border-top:1px solid #ccc">
    <p>© 2024</p>
  </footer>
</body>
</html>
