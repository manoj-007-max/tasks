<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Contact Form</title>
</head>
<body>
<form action="#" method="post">
  <fieldset>
    <legend>Contact Us</legend>

    <label for="n">Name:</label>
    <input type="text" id="n" name="name" required aria-required="true">

    <label for="e">Email:</label>
    <input type="email" id="e" name="email" required aria-required="true">

    <label for="p">Phone:</label>
    <input type="tel" id="p" name="phone">

    <label for="s">Subject:</label>
    <select id="s" name="subject">
      <option value="hi">Support</option>
      <option value="biz">Business</option>
    </select>

    <p>Contact via:</p>
    <input type="radio" id="r1" name="pref" value="e" checked>
    <label for="r1">Email</label>
    <input type="radio" id="r2" name="pref" value="p">
    <label for="r2">Phone</label>

    <label for="m">Message:</label>
    <textarea id="m" name="msg" required aria-required="true"></textarea>

    <input type="checkbox" id="c" name="sub">
    <label for="c">Subscribe to news</label>

    <button type="submit">Send</button>
  </fieldset>
</form>
</body>
</html>
